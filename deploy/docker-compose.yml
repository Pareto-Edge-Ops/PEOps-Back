# PEOps — backend stack (independently deployable).
#
# This brings up ONLY the backend: the FastAPI API, the arq worker, and their
# infrastructure (PostgreSQL, Redis, MinIO/S3). It does NOT build or serve the
# frontend — the SPA is deployed separately from the PEOps-Front repo, whose
# Caddy reverse-proxies /api back to this stack (BACKEND_UPSTREAM).
#
# Run from this directory (PEOps-Back/deploy):
#     cp .env.example .env   # edit secrets
#     docker compose up -d --build
# The API is then reachable at http://localhost:${PEOPS_API_PORT:-8000}
# (e.g. http://localhost:8000/healthz).
#
# Build context for api/worker is `..` (the PEOps-Back repo). The compression
# engine (`peops/`) is vendored into the repo, so the image is self-contained —
# no sibling checkout or copy step is required.

# Pin the compose project name so this stack is isolated from the frontend stack
# (both live in a directory literally named `deploy`, which would otherwise
# collide on the default project name and treat each other's containers as
# orphans).
name: peops-backend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peops}
      POSTGRES_DB: ${POSTGRES_DB:-peops}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peops}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-peopsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-peopssecret}
    volumes:
      - miniodata:/data

  # One-shot: wait for MinIO, then create the artifacts bucket. Gates the app.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-peopsadmin} ${MINIO_ROOT_PASSWORD:-peopssecret}; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/${PEOPS_S3_BUCKET:-peops-artifacts};
      echo 'minio bucket ready';
      "

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["sh", "-c", "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    # Publish the API so the separately-deployed frontend (its Caddy) and any
    # direct SDK clients can reach it. PEOPS_API_BIND defaults to 127.0.0.1 so a
    # single-box dev run isn't exposed; set it to 0.0.0.0 (or a specific host IP)
    # when the frontend stack runs elsewhere. In production keep this on a private
    # network behind TLS rather than a public 0.0.0.0 bind.
    ports:
      - "${PEOPS_API_BIND:-127.0.0.1}:${PEOPS_API_PORT:-8000}:8000"
    environment: &backend_env
      PEOPS_DATABASE_URL: postgresql://${POSTGRES_USER:-peops}:${POSTGRES_PASSWORD:-peops}@postgres:5432/${POSTGRES_DB:-peops}
      PEOPS_REDIS_URL: redis://redis:6379/0
      PEOPS_STORAGE_BACKEND: s3
      PEOPS_S3_ENDPOINT_URL: http://minio:9000
      PEOPS_S3_BUCKET: ${PEOPS_S3_BUCKET:-peops-artifacts}
      PEOPS_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-peopsadmin}
      PEOPS_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-peopssecret}
      PEOPS_S3_FORCE_PATH_STYLE: "1"
      PEOPS_JWT_SECRET: ${PEOPS_JWT_SECRET:-change-me-in-production}
      # The public origin browsers use to reach the PRODUCT (the frontend's
      # Caddy). Drives CORS and the base URLs rendered in SDK snippets.
      PEOPS_PUBLIC_ORIGIN: ${PEOPS_PUBLIC_ORIGIN:-http://localhost:8080}
      PEOPS_CORS_ORIGINS: ${PEOPS_PUBLIC_ORIGIN:-http://localhost:8080}
      PEOPS_COOKIE_SECURE: ${PEOPS_COOKIE_SECURE:-0}
      PEOPS_GOOGLE_CLIENT_ID: ${PEOPS_GOOGLE_CLIENT_ID:-}
      PEOPS_GOOGLE_CLIENT_SECRET: ${PEOPS_GOOGLE_CLIENT_SECRET:-}
      PEOPS_GOOGLE_REDIRECT_URI: ${PEOPS_GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      PEOPS_FAST_PIPELINE: ${PEOPS_FAST_PIPELINE:-0}
      PEOPS_PARETO_TRIALS: ${PEOPS_PARETO_TRIALS:-150}
      PEOPS_INLINE_JOBS: "0"
      PEOPS_LOG_JSON: "1"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 4s
      retries: 12

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    environment: *backend_env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }

volumes:
  pgdata:
  miniodata:
